<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Base Apparel </title>

  <link rel="stylesheet" href="style.css">
<main>
  <div class="container">
    <div class="left">
      <div class="logo">
        <img src="./images/logo.svg" alt="Base Apparel Logo">
      </div>
      <div class="container_1">
        <h1>We're <strong>coming soon</strong></h1>
      </div>
      <div class="container_2">
        Hello fellow shoppers! We're currently building our new fashion store.
        Add your email below to stay up-to-date with announcements and our launch deals.
      </div>
      <form>
        <input type="email" placeholder="Email Address">
        <button type="submit"><img src="./images/icon-arrow.svg" alt="Arrow Icon"></button>
      </form>
    </div>

    <div class="right">
      <img src="./images/hero-desktop.jpg" alt="Girl">
    </div>
  </div>
</main>

 
      <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
      Coded by <a href="#">Tawo QueenEsther Obiageli</a>.
    </footer>
</body>
<script src="script.js"></script>
</html>
